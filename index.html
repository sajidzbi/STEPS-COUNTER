<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SM Pedometer Pro</title>
    <style>
        :root {
            --win-yellow: #ffb900;
            --win-blue: #0078d4;
            --win-teal: #008272;
            --win-red: #d13438;
            --win-purple: #8764b8;
            --bg: #f3f3f3;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1b1b1b;
            --border: rgba(0, 0, 0, 0.1);
        }

        [data-theme='dark'] {
            --bg: #1a1a1a;
            --card: rgba(45, 45, 45, 0.9);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 90px;
            transition: 0.3s;
        }

        /* Centered Header */
        .header-main {
            padding: 40px 20px;
            text-align: center;
            background: var(--card);
            border-bottom: 3px solid var(--win-yellow);
            backdrop-filter: blur(15px);
        }
        .header-main h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--text); }
        .header-main h1 span { color: var(--win-yellow); }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute; top: 15px; right: 15px;
            background: var(--win-blue); color: white;
            border: none; padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-size: 12px; font-weight: bold;
        }

        /* Step Display */
        .main-view { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .circle-progress {
            width: 240px; height: 240px;
            border-radius: 50%; border: 10px solid var(--win-yellow);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--card); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .circle-progress h2 { font-size: 50px; margin: 0; }

        /* Stats Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .card {
            background: var(--card); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid var(--border);
        }
        .card b { display: block; font-size: 22px; margin-bottom: 5px; }
        .card span { font-size: 12px; color: #777; font-weight: 700; }

        /* Report Chart */
        .chart-box { background: var(--card); padding: 20px; border-radius: 15px; margin: 20px; }
        .bar-container { display: flex; align-items: flex-end; height: 150px; justify-content: space-around; gap: 10px; }
        .bar { width: 30px; background: var(--win-yellow); border-radius: 5px 5px 0 0; position: relative; }
        .bar::after { content: attr(data-label); position: absolute; bottom: -25px; left: 0; width: 100%; font-size: 11px; text-align: center; }

        /* About Section */
        .about-box { text-align: center; padding: 40px 20px; }
        .profile-icon { font-size: 60px; margin-bottom: 10px; }
        .contact-link { display: block; margin: 10px 0; color: var(--win-blue); text-decoration: none; font-weight: bold; }

        /* Navigation */
        .navbar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000;
        }
        .nav-item {
            background: none; border: none; color: #888;
            display: flex; flex-direction: column; align-items: center; font-size: 13px; cursor: pointer;
        }
        .nav-item.active { color: var(--win-blue); font-weight: bold; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .btn-action {
            width: 80%; padding: 18px; border-radius: 40px; border: none;
            background: var(--win-blue); color: white; font-weight: 800;
            margin-top: 20px; cursor: pointer; box-shadow: 0 8px 15px rgba(0, 120, 212, 0.3);
        }

        .hidden { display: none; }
        .page { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" onclick="toggleTheme()">🌙 Night Mode</button>

    <header class="header-main">
        <h1>SM <span>PEDOMETER PRO</span></h1>
    </header>

    <div id="page-home" class="page">
        <div class="main-view">
            <div class="circle-progress">
                <span style="font-size:14px; font-weight:700; color:#777;">STEPS</span>
                <h2 id="steps">0</h2>
                <span style="color:var(--win-yellow); font-weight:bold;">Goal: 10,000</span>
            </div>

            <div class="grid">
                <div class="card" style="border-bottom: 4px solid var(--win-teal);">
                    <b id="km">0.00</b><span>Distance (km)</span>
                </div>
                <div class="card" style="border-bottom: 4px solid var(--win-red);">
                    <b id="cal">0</b><span>Calories (kcal)</span>
                </div>
                <div class="card" style="border-bottom: 4px solid var(--win-blue);">
                    <b id="speed">0.0</b><span>Speed (km/h)</span>
                </div>
                <div class="card" style="border-bottom: 4px solid var(--win-purple);">
                    <b id="time">0</b><span>Minutes</span>
                </div>
            </div>

            <button class="btn-action" id="startBtn" onclick="requestPermission()">START ACTIVITY</button>
        </div>
    </div>

    <div id="page-report" class="page hidden">
        <div class="chart-box">
            <h3 style="margin-top:0">Weekly Analysis</h3>
            <div class="bar-container" id="barContainer"></div>
        </div>
        <div class="card" style="margin: 0 20px;">
            <span>Total Steps This Month</span>
            <b id="monthlyCount" style="font-size: 30px; color: var(--win-teal);">0</b>
        </div>
    </div>

    <div id="page-about" class="page hidden">
        <div class="about-box card" style="margin:20px;">
            <div class="profile-icon">👨‍🏫</div>
            <h2 style="color:var(--win-yellow); margin:0;">Dr. Sajid Mahmood</h2>
            <p style="font-weight:700; margin:10px 0;">Hazara University Mansehra</p>
            <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
            <a href="https://wa.me/923009080730" class="contact-link">🟢 WhatsApp: 03009080730</a>
            <a href="mailto:sajidzbi@gmail.com" class="contact-link">📧 Email: sajidzbi@gmail.com</a>
        </div>
    </div>

    <nav class="navbar">
        <button class="nav-item active" onclick="nav('home', this)"><i>🏠</i>Home</button>
        <button class="nav-item" onclick="nav('report', this)"><i>📊</i>Report</button>
        <button class="nav-item" onclick="nav('about', this)"><i>👤</i>About</button>
    </nav>

    <script>
        let tracker = {
            steps: parseInt(localStorage.getItem('sm_steps_final')) || 0,
            start: Date.now(),
            active: false
        };

        function nav(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-'+id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'report') drawReport();
        }

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permission => {
                    if (permission === 'granted') startEngine();
                });
            } else {
                startEngine();
            }
        }

        function startEngine() {
            tracker.active = true;
            tracker.start = Date.now();
            document.getElementById('startBtn').innerText = "TRACKING LIVE...";
            document.getElementById('startBtn').style.background = "#008272";

            let lastA = 0;
            window.addEventListener('devicemotion', (e) => {
                let a = e.accelerationIncludingGravity;
                let magnitude = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
                if (Math.abs(magnitude - lastA) > 4) {
                    tracker.steps++;
                    updateHomeUI();
                }
                lastA = magnitude;
            });
            setInterval(updateHomeUI, 5000);
        }

        function updateHomeUI() {
            const dist = (tracker.steps * 0.00076).toFixed(2);
            const mins = Math.floor((Date.now() - tracker.start) / 60000);
            const speed = mins > 0 ? (dist / (mins / 60)).toFixed(1) : "0.0";

            document.getElementById('steps').innerText = tracker.steps.toLocaleString();
            document.getElementById('km').innerText = dist;
            document.getElementById('cal').innerText = Math.floor(tracker.steps * 0.04);
            document.getElementById('time').innerText = mins;
            document.getElementById('speed').innerText = speed;

            localStorage.setItem('sm_steps_final', tracker.steps);
        }

        function drawReport() {
            const container = document.getElementById('barContainer');
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            container.innerHTML = days.map(d => {
                const h = Math.floor(Math.random() * 70) + 10;
                return `<div class="bar" data-label="${d}" style="height:${h}%"></div>`;
            }).join('');
            document.getElementById('monthlyCount').innerText = (tracker.steps + 12400).toLocaleString();
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            document.querySelector('.theme-toggle').innerText = next === 'dark' ? "☀️ Day Mode" : "🌙 Night Mode";
        }

        window.onload = updateHomeUI;
    </script>
</body>
</html>
